name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend-lint-type:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
      - run: uv sync --extra dev
      - run: uv run ruff check .
      - run: uv run ruff format --check .
      - run: uv run mypy app

  backend-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: debrief
          POSTGRES_PASSWORD: debrief
          POSTGRES_DB: debrief_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql+asyncpg://debrief:debrief@localhost:5432/debrief_test
      DATABASE_URL_SYNC: postgresql+psycopg://debrief:debrief@localhost:5432/debrief_test
      TEST_DATABASE_URL: postgresql+asyncpg://debrief:debrief@localhost:5432/debrief_test
      REDIS_URL: redis://localhost:6379/0
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
      - run: uv sync --extra dev
      # Proves the migration itself applies cleanly from empty, independent
      # of the tests (which build their schema from the ORM models directly
      # via create_all -- see DECISIONS.md-adjacent note in tests/conftest.py).
      - run: uv run alembic upgrade head
      - run: uv run pytest --cov=app --cov-report=term-missing

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm exec tsc --noEmit
      - run: pnpm lint
      - run: pnpm build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8000

  docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: docker build -t debrief-api ./backend
      - run: docker build -t debrief-web --build-arg NEXT_PUBLIC_API_URL=http://localhost:8000 ./frontend
