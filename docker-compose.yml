services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: debrief
      POSTGRES_PASSWORD: debrief
      POSTGRES_DB: debrief
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U debrief"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://debrief:debrief@postgres:5432/debrief
      DATABASE_URL_SYNC: postgresql+psycopg://debrief:debrief@postgres:5432/debrief
      REDIS_URL: redis://redis:6379/0
      GIT_SHA: ${GIT_SHA:-dev}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      CORS_ORIGINS: http://localhost:3000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build: ./backend
    command: sh -c "arq app.workers.worker.WorkerSettings"
    environment:
      DATABASE_URL: postgresql+asyncpg://debrief:debrief@postgres:5432/debrief
      DATABASE_URL_SYNC: postgresql+psycopg://debrief:debrief@postgres:5432/debrief
      REDIS_URL: redis://redis:6379/0
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  web:
    build:
      context: ./frontend
      args:
        # NEXT_PUBLIC_* is baked into the client bundle at build time, not
        # read at container runtime -- setting it under `environment:` below
        # would be silently too late. Browser hits localhost:8000 directly
        # (the mapped host port), not the api container's DNS name.
        NEXT_PUBLIC_API_URL: http://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      - api

volumes:
  postgres_data:
