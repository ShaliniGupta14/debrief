services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: debrief
      POSTGRES_PASSWORD: debrief
      POSTGRES_DB: debrief
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U debrief"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://debrief:debrief@postgres:5432/debrief
      DATABASE_URL_SYNC: postgresql+psycopg://debrief:debrief@postgres:5432/debrief
      REDIS_URL: redis://redis:6379/0
      GIT_SHA: ${GIT_SHA:-dev}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  web:
    build: ./frontend
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    depends_on:
      - api

volumes:
  postgres_data:
